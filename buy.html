<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Payment...</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="status-box">
            <div class="spinner"></div>
            <h2 id="status-title">Checking your account...</h2>
            <p id="status-msg">Please wait a moment.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL  = 'https://rgigtqpesabuyaumibaj.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnaWd0cXBlc2FidXlhdW1pYmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3NTA2OTcsImV4cCI6MjA4NDMyNjY5N30.MaMvKpVPqCQONsNaYifkSvVFmYbT5c4HYpi_qieN4H0';
        const STRIPE_LINK   = 'https://buy.stripe.com/3cI6oIb6H02w6fQ1ck2Ry00';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        function showAlreadySubscribed() {
            // Halt the redirect and swap the card to a clear "you're already
            // subscribed" message. The spinner would otherwise imply something
            // is still loading, which is a UX lie once we've decided to block.
            const spinner = document.querySelector('.spinner');
            if (spinner) spinner.style.display = 'none';
            document.getElementById('status-title').textContent = 'You already have an active subscription';
            document.getElementById('status-msg').innerHTML =
                'Your account is already on the AiRi Standard plan. ' +
                'Manage your subscription, view invoices, or cancel from your ' +
                '<a href="account.html" style="color:#a78bfa;text-decoration:underline;">account page</a>.';
        }

        async function hasActivePaidSubscription(user, token) {
            // Returns true only when BOTH sides agree:
            //   - licenses row: tier=standard, status=active for this email
            //   - purchases row: matching license_key with a real stripe_subscription_id
            // The purchases cross-check is load-bearing: admin-minted "standard"
            // keys (no purchase row) must NOT trigger the block, otherwise we'd
            // lock admins out of buying via their own accounts for testing.
            // On any failure we return false (permissive) — a transient RLS or
            // network blip should never block a paying customer from checkout.
            try {
                const licParams = new URLSearchParams({
                    select: 'license_key,status,tier',
                    email:  `ilike.${user.email}`,
                    tier:   'eq.standard',
                    status: 'eq.active',
                });
                const purParams = new URLSearchParams({
                    select: 'license_key,stripe_subscription_id',
                    email:  `ilike.${user.email}`,
                    stripe_subscription_id: 'not.is.null',
                });
                const [licRes, purRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/licenses?${licParams.toString()}`, {
                        headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` },
                    }),
                    fetch(`${SUPABASE_URL}/rest/v1/purchases?${purParams.toString()}`, {
                        headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` },
                    }),
                ]);
                if (!licRes.ok || !purRes.ok) return false;
                const licenses  = await licRes.json();
                const purchases = await purRes.json();
                if (!Array.isArray(licenses) || licenses.length === 0) return false;
                const realSubKeys = new Set(
                    (Array.isArray(purchases) ? purchases : [])
                        .filter(p => p && p.stripe_subscription_id)
                        .map(p => p.license_key)
                );
                return licenses.some(l => realSubKeys.has(l.license_key));
            } catch (e) {
                console.warn('Duplicate-sub check skipped:', e);
                return false;
            }
        }

        async function isAdmin(user, token) {
            // Profile admin flag matches the same signal account.html uses for
            // the "Admin" button. Fail-open: on any error we return false so the
            // normal sub check still applies. Admins bypass the block entirely
            // because they need to test purchase flows against their own email.
            try {
                const params = new URLSearchParams({
                    select: 'is_admin',
                    id:     `eq.${user.id}`,
                });
                const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?${params.toString()}`, {
                    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${token}` },
                });
                if (!res.ok) return false;
                const rows = await res.json();
                return !!(Array.isArray(rows) && rows[0] && rows[0].is_admin);
            } catch (e) {
                console.warn('Admin check skipped:', e);
                return false;
            }
        }

        async function init() {
            const { data: { session } } = await client.auth.getSession();

            if (!session) {
                // Not logged in — send to account page with return flag
                document.getElementById('status-title').textContent = 'Account required';
                document.getElementById('status-msg').textContent   = 'Please sign in or create a free account first. Redirecting...';
                setTimeout(() => {
                    window.location.href = 'account.html?redirect=buy';
                }, 1500);
                return;
            }

            const user  = session.user;
            const token = session.access_token;

            // Pre-flight: block duplicate subscriptions for non-admins. Admins
            // are explicitly exempt so they can maintain multiple licenses for
            // testing / support / internal accounts.
            const admin = await isAdmin(user, token);
            if (!admin) {
                const already = await hasActivePaidSubscription(user, token);
                if (already) { showAlreadySubscribed(); return; }
            }

            // Logged in and clear to buy — proceed to Stripe. Promo codes are
            // entered on Stripe's hosted checkout page (allow_promotion_codes
            // is set on the Payment Link), so no prompt is needed here.
            document.getElementById('status-title').textContent = 'Redirecting to Stripe...';
            document.getElementById('status-msg').textContent   = 'You are being transferred to our secure payment processor.';
            setTimeout(() => {
                window.location.href = STRIPE_LINK;
            }, 800);
        }

        init();
    </script>
</body>
</html>
